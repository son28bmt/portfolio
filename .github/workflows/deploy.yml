name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            export APP_ROOT="${{ secrets.APP_ROOT }}"
            export DEPLOY_BRANCH="${{ secrets.DEPLOY_BRANCH || 'main' }}"
            export GIT_REPO_URL="${{ secrets.GIT_REPO_URL }}"
            export SERVER_DIR="${{ secrets.SERVER_DIR }}"
            export CLIENT_DIR="${{ secrets.CLIENT_DIR }}"
            export ADMIN_DIR="${{ secrets.ADMIN_DIR }}"
            export CLIENT_WEB_ROOT="${{ secrets.CLIENT_WEB_ROOT }}"
            export ADMIN_WEB_ROOT="${{ secrets.ADMIN_WEB_ROOT }}"
            export API_RESTART_CMD="${{ secrets.API_RESTART_CMD }}"
            export HEALTHCHECK_URL="${{ secrets.HEALTHCHECK_URL }}"
            bash "${APP_ROOT}/scripts/deploy.sh"
